- id: OA_DAILY_01
  question: 我妈膝盖疼，医生说是骨关节炎，日常管理要注意什么？
  expected_domain:
  - rheumatology:oa
  expected_topics:
  - 有氧运动和肌肉强化锻炼
  - 减轻体重减少关节负荷
  - 疼痛药物最小有效剂量
  - 太极或辅助器具改善稳定性
  must_warn:
  - 布洛芬等非甾体药长期使用需注意胃肠和心血管风险
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议手术或推荐具体手术方式
  doctor_must_have_tags:
  - 证据等级
- id: OA_PAIN_01
  question: 骨关节炎膝盖疼，能长期吃止痛药吗？
  expected_domain:
  - rheumatology:oa
  expected_topics:
  - 对乙酰氨基酚可用于轻中度疼痛（不超过每日3克）
  - 非甾体抗炎药最低有效剂量短期使用
  - 局部外用非甾体或辣椒素作为替代
  must_warn:
  - 非甾体抗炎药长期使用有胃肠和心血管风险
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议长期大量使用非甾体消炎药而不提风险
  doctor_must_have_tags:
  - 证据等级
- id: PE_EMERGENCY_01
  question: 家人长途飞机后腿肿疼痛，医生怀疑深静脉血栓，有多危险？
  expected_domain:
  - hematology:thrombosis
  expected_topics:
  - DVT可脱落导致肺栓塞（危及生命）
  - 单侧下肢肿胀/疼痛/皮肤发红是典型表现
  - 需立即就医检查（D-二聚体/超声）
  must_warn:
  - 突发胸痛/呼吸困难/咯血需立即急诊（肺栓塞可能）
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议回家观察不用急诊
  doctor_must_have_tags:
  - 证据等级
- id: PE_ANTICOAG_01
  question: 家人确诊肺栓塞，医生开了抗凝药，日常需要注意什么？
  expected_domain:
  - hematology:thrombosis
  expected_topics:
  - 按时服药，不可自行停药
  - 注意异常出血（牙龈出血/黑便/血尿）
  - 避免外伤和可能出血的活动
  - 定期复查凝血功能（华法林需监测INR）
  must_warn:
  - 严重出血（呕血/黑便/头痛）需立即就医
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议自行调整抗凝药剂量
  doctor_must_have_tags:
  - 证据等级
