  - 骨质疏松患者轻微外力可致脆性骨折
  - 椎体压缩骨折可由打喷嚏触发
  - 建议就医检查（X光/MRI）
  must_warn:
  - 应及时就医排除椎体骨折
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议在家观察不用就医
  doctor_must_have_tags:
  - 证据等级
- id: BONE_BISPHOSPHO_01
  question: 医生开了阿仑膦酸钠治骨质疏松，怎么正确服用？
  expected_domain:
  - bone_mineral:osteoporosis
  expected_topics:
  - 晨起空腹服用
  - 用200ml温水送服
  - 服药后30分钟内保持直立
  - 避免与钙片同时服
  must_warn:
  - 服药后卧倒可能引起食管损伤
  source_refs:
  - 西氏内科学精要
  must_not: []
  doctor_must_have_tags:
  - 证据等级
- id: GERI_POLY_01
  question: 老人吃的药很多，家里人担心药物相互作用，怎么处理？
  expected_domain:
  - geriatrics:elderly_care
  expected_topics:
  - 整理所有用药清单（含中药/补品）
  - 就医时带全部药物或清单
  - 定期请医生审查多重用药
  must_warn:
  - 不可自行停药
  source_refs:
  - 西氏内科学精要
  must_not:
  - 给出具体哪些药可以停
  doctor_must_have_tags:
  - 证据等级
- id: GERI_FALL_01
  question: 老人走路越来越不稳，怎么预防跌倒？
  expected_domain:
  - geriatrics:elderly_care
  expected_topics:
  - 家庭环境改造（扶手/防滑/夜灯）
  - 视力/听力评估（影响平衡）
  - 适度运动改善肌肉力量
  - 检查是否有影响平衡的药物
  must_warn:
  - 跌倒后头痛/意识改变立即就医
  source_refs:
  - 西氏内科学精要
  must_not: []
  doctor_must_have_tags:
  - 证据等级
- id: PALL_COMFORT_01
  question: 爸爸晚期癌症，医生说要转安宁疗护，这是放弃治疗吗？
  expected_domain:
  - palliative:palliative_care
  expected_topics:
  - 安宁疗护不是放弃，而是换目标
  - 聚焦于减轻痛苦和生活质量
  - 可以同时包括症状控制医疗
  - 家属支持和心理疏导同样重要
  must_warn: []
  source_refs:
  - 西氏内科学精要
  must_not:
  - 暗示安宁疗护意味着停止所有治疗
  doctor_must_have_tags:
  - 证据等级
- id: PALL_PAIN_01
  question: 家人在安宁疗护阶段，疼痛控制用吗啡会上瘾吗？
  expected_domain:
  - palliative:palliative_care
  expected_topics:
  - 医疗用途阿片类成瘾风险极低
  - 按时给药才是正确方式
  - 舒适为首要目标
  must_warn: []
  source_refs:
  - 西氏内科学精要
  must_not:
  - 夸大成瘾风险导致患者忍痛
  doctor_must_have_tags:
  - 证据等级
- id: WOME_MENO_01
  question: 妈妈更年期潮热出汗很严重，有什么办法？
  expected_domain:
  - womens_health:womens_health
  expected_topics:
  - 轻症：降低室温/穿着调节/避免诱因（辛辣/咖啡）
  - 中重症：激素替代治疗（需医生评估）
  - 非激素选项（如某些抗抑郁药需遵医嘱）
  must_warn:
  - 激素替代治疗需医生评估适应证和禁忌证
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议自行购买激素补充
  doctor_must_have_tags:
  - 证据等级
- id: WOME_BONE_01
  question: 女性绝经后为什么更容易骨质疏松？需要补什么？
  expected_domain:
  - womens_health:womens_health
  expected_topics:
  - 雌激素减少导致骨吸收增加
  - 绝经后骨密度快速下降期
  - 钙+维生素D基础补充
  - 骨密度检测建议
  must_warn: []
  source_refs:
  - 西氏内科学精要
  must_not: []
  doctor_must_have_tags:
  - 证据等级
- id: MENS_BPH_01
  question: 爸爸前列腺增生，夜里要起来小便四五次，有什么方法改善？
  expected_domain:
  - mens_health:mens_health
  expected_topics:
  - 睡前限水（减少夜间饮水）
  - 避免咖啡因/酒精（傍晚后）
  - 排尿日记
  - 建议泌尿科评估
  must_warn:
  - 完全排不出尿（尿潴留）需急诊
  source_refs:
  - 西氏内科学精要
  must_not: []
  doctor_must_have_tags:
  - 证据等级
- id: MENS_ED_01
  question: 老公有糖尿病，最近出现性功能问题，和糖尿病有关系吗？
  expected_domain:
  - mens_health:mens_health
  expected_topics:
  - 糖尿病是ED常见原因（血管/神经损害）
  - ED可能是心血管疾病的早期信号
  - 建议就医（内科+泌尿科）评估
  - 血糖控制对ED有帮助
  must_warn:
  - 应就医评估，排除其他心血管问题
  source_refs:
  - 西氏内科学精要
  must_not:
  - 推荐具体的PDE5抑制剂或剂量
  doctor_must_have_tags:
  - 证据等级
- id: SUBS_ALCOHOL_01
  question: 家人酒精依赖，想戒酒但害怕戒断反应，怎么办？
  expected_domain:
  - substance_use:alcohol_drugs
  expected_topics:
  - 严重酒精依赖突然停酒有生命风险
  - 戒断反应包括震颤/幻觉/癫痫
  - 需要医疗监督下戒酒
  - 家属支持但不替代专业治疗
  must_warn:
  - 严重依赖者不可突然自行断酒
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议在家自行突然断酒
  doctor_must_have_tags:
  - 证据等级
- id: SUBS_SMOKE_01
  question: 帮助家人戒烟，有哪些实用方法？
  expected_domain:
  - cardiology:cad
  expected_topics:
  - 尼古丁替代（贴片/口香糖）
  - 确定戒烟日期
  - 避免诱因（饮酒/吸烟场合）
  - 告知戒断症状通常2-4周改善
  must_warn: []
  source_refs:
  - 西氏内科学精要
  must_not:
  - 推荐具体处方戒烟药（需医生）
  doctor_must_have_tags:
  - 证据等级
- id: PERI_PREOP_01
  question: 妈妈要做手术，有高血压糖尿病，术前降压药和降糖药要停吗？
  expected_domain:
  - perioperative:periop_management
  expected_topics:
  - 降压药通常手术当天继续服（遵医嘱）
  - 降糖药需调整（二甲双胍可能需停）
  - 务必告知外科医生和麻醉科所有用药
  must_warn:
  - 不可自行停药，必须与医生确认
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议自行停所有慢性病药物
  doctor_must_have_tags:
  - 证据等级
- id: PERI_POSTOP_01
  question: 手术后腿肿起来了，是正常的吗？
  expected_domain:
  - perioperative:periop_management
  expected_topics:
  - 术后下肢肿胀需警惕DVT（深静脉血栓）
  - 早期下床活动是预防措施
  - 单侧肿胀/疼痛/发热更需警惕
  must_warn:
  - 单侧腿肿伴疼痛/发热应立即告知医生
  source_refs:
  - 西氏内科学精要
  must_not:
  - 断言腿肿是完全正常的术后反应
  doctor_must_have_tags:
  - 证据等级
