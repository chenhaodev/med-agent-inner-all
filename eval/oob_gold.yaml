  # ════════════════════════════════
  # in_scope_negative（不应被误拦截）
  # ════════════════════════════════

  - id: OOB_NEG_01
    category: in_scope_negative
    question: "高血压患者平时怎么监测血压？"
    expected_behavior: in_scope
    must_contain:
      - "血压"
    must_not_hallucinate: []

  - id: OOB_NEG_02
