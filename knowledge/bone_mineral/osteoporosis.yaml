specialty: bone_mineral
specialty_zh: bone_mineral
disease: osteoporosis
disease_zh: osteoporosis
source: 《西氏内科学精要》（中文版）
entries:
- id: OSTEO_DEF
  title: 骨质疏松症定义
  source_page: 818
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 骨质疏松是骨强度下降导致骨折风险增加的疾病。
  - 骨强度包括骨密度和骨质量两方面。
  pdf_page: 207
- id: OSTEO_EPID
  title: 流行病学数据
  source_page: 819
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 50岁以上女性患病率约50%，男性约25%。
  - 美国每年约200万人发生骨质疏松性骨折。
  - 髋部骨折后1年内死亡率超过20%。
  pdf_page: 208
- id: OSTEO_RISK
  title: 危险因素
  source_page: 819
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 遗传、性别、年龄是主要因素，女性风险更高。
  - 绝经后雌激素下降导致骨量快速丢失。
  - 糖皮质激素、抗癫痫药等药物可导致骨量丢失。
  - 跌倒风险因素如视力差、肌无力也增加骨折风险。
  pdf_page: 208
- id: OSTEO_SYMP
  title: 临床表现
  source_page: 819
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 骨折前通常无症状，被称为“寂静”疾病。
  - 椎体骨折可导致背痛、身高变矮、驼背。
  - 髋部骨折多由跌倒引起，需警惕。
  pdf_page: 208
- id: OSTEO_DIAG
  title: 诊断标准
  source_page: 820
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 骨密度T值≤-2.5可诊断为骨质疏松。
  - 双能X线吸收法是标准检测方法。
  - 有椎体或髋部骨折史也可确诊。
  pdf_page: 209
- id: OSTEO_SCREEN
  title: 筛查建议
  source_page: 821
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 65岁以上女性应进行骨密度筛查。
  - 70岁以上男性也应考虑筛查。
  - 有骨折史或使用影响骨量药物者需提前筛查。
  pdf_page: 210
- id: OSTEO_FRAX
  title: 骨折风险评估工具
  source_page: 821
  evidence_level: 高
  recommendation: 推荐
  key_points:
  - FRAX工具可预测10年内骨折风险。
  - 需提供年龄、性别、骨密度、吸烟史等信息。
  - 评估结果有助于决定是否需要治疗。
  pdf_page: 210
- id: OSTEO_LAB
  title: 实验室检查
  source_page: 821
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 需检查血钙、维生素D、肾功能等排除继发原因。
  - 男性应检测睾酮水平。
  - 骨转换标志物主要用于科研或长期治疗监测。
  pdf_page: 210
- id: OSTEO_PREV
  title: 预防措施
  source_page: 823
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 每日钙摄入1200mg，可通过饮食或补充剂。
  - 维生素D对钙吸收和肌力重要，需补充。
  - 规律运动如步行、力量训练有助骨骼健康。
  - 预防跌倒：改善照明、使用扶手、穿防滑鞋。
  pdf_page: 212
- id: OSTEO_WHEN
  title: 何时就医
  source_page: 819
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 出现不明原因背痛、身高变矮或驼背时就医。
  - 跌倒后髋部或大腿疼痛需立即就医。
  - 长期使用双膦酸盐者出现大腿疼痛需警惕非典型骨折。
  pdf_page: 208
