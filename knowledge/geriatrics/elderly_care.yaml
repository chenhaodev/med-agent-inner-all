specialty: geriatrics
specialty_zh: geriatrics
disease: elderly_care
disease_zh: elderly_care
source: 《西氏内科学精要》（中文版）
entries:
- id: AGING_POPULATION
  title: 老年人口增长趋势
  source_page: 1206
  evidence_level: 高
  recommendation: 未注明
  key_points:
  - 65岁以上人口快速增长，预计2030年达7200万。
  - 85岁以上高龄老人增长更快，需关注其照护需求。
  pdf_page: 593
- id: FRAILTY_DEFINITION
  title: 衰弱表型识别
  source_page: 1209
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 衰弱表现为非预期体重下降、虚弱、行动缓慢等。
  - 满足3项及以上标准可判断为衰弱，需及时干预。
  pdf_page: 596
- id: MULTIMORBIDITY_IMPACT
  title: 共病对功能的影响
  source_page: 1210
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 80%以上老人至少有一种慢性病，50%有两种以上。
  - 多种疾病共存会加重功能衰退，需综合管理。
  pdf_page: 597
- id: FUNCTIONAL_ASSESSMENT
  title: 日常生活能力评估
  source_page: 1210
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 评估基本生活能力如洗澡、穿衣、进食等。
  - 工具性能力包括购物、用药管理、使用电话等。
  pdf_page: 597
- id: ATYPICAL_PRESENTATION
  title: 老年疾病不典型表现
  source_page: 1210
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 老年甲亢可表现为冷漠、抑郁，而非典型心悸。
  - 感染可能不发热，需警惕精神状态变化或跌倒。
  pdf_page: 597
- id: POLYPHARMACY_RISK
  title: 多重用药风险
  source_page: 1211
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 老人平均服用3-5种药物，增加相互作用风险。
  - 定期审查用药清单，避免不必要的药物。
  pdf_page: 598
- id: KIDNEY_FUNCTION_MONITOR
  title: 肾功能与药物调整
  source_page: 1211
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 年龄增长导致肾小球滤过率下降，影响药物清除。
  - 用药前需计算肌酐清除率，调整剂量。
  pdf_page: 598
- id: FALL_PREVENTION
  title: 跌倒预防策略
  source_page: 1209
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 衰弱老人跌倒风险高，需评估平衡和步态。
  - 改善家居环境，如增加扶手、减少障碍物。
  pdf_page: 596
- id: NUTRITION_MANAGEMENT
  title: 营养管理要点
  source_page: 1208
  evidence_level: 中
  recommendation: 可考虑
  key_points:
  - 热量限制可能延长寿命，但需在医生指导下进行。
  - 保证蛋白质和微量元素摄入，预防营养不良。
  pdf_page: 595
- id: WHEN_TO_SEEK_CARE
  title: 何时就医警示
  source_page: 1210
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 出现非特异性症状如意识改变、跌倒、尿失禁。
  - 功能突然下降或日常生活能力恶化需及时就医。
  pdf_page: 597
