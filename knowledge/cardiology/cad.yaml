specialty: cardiology
specialty_zh: 心血管
disease: cad
disease_zh: 冠心病
source: 《西氏内科学精要》（中文版）
entries:
- id: CAD_RISK_FACTORS
  title: 冠心病危险因素
  source_page: 92
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 不可控因素包括年龄、性别和家族史，需定期监测。
  - 可控因素如高血脂、高血压、糖尿病、吸烟等，应积极管理。
  - 代谢综合征（腰围大、血脂异常等）增加风险，需综合干预。
  pdf_page: 113
- id: CAD_SYMPTOMS
  title: 心绞痛症状识别
  source_page: 95
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 典型表现为胸骨后压迫感或紧缩感，可放射至手臂、喉部。
  - 症状常由运动或情绪激动诱发，休息或含服硝酸甘油可缓解。
  - 若症状持续超过20分钟，可能为心肌梗死，需立即就医。
  pdf_page: 116
- id: CAD_DIAGNOSIS
  title: 诊断检查方法
  source_page: 96
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 心电图可发现心肌缺血导致的ST段改变。
  - 负荷试验（如运动心电图）评估心脏在应激下的反应。
  - 超声心动图或核素显像可观察室壁运动和心肌灌注。
  pdf_page: 117
- id: CAD_LIFESTYLE
  title: 生活方式管理
  source_page: 93
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 规律有氧运动（如快走）可降低冠心病风险。
  - 戒烟后2年内，冠心病事件风险可下降50%。
  - 控制体重（BMI<30），减少腹型肥胖。
  pdf_page: 114
- id: CAD_DIET
  title: 饮食与饮酒建议
  source_page: 93
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 少量饮酒（每日1-2盎司）可能有益，过量则增加风险。
  - 高脂血症患者需低脂饮食，降低低密度脂蛋白。
  - 控制三酰甘油和胆固醇水平，保护高密度脂蛋白。
  pdf_page: 114
- id: CAD_MEDICATION
  title: 药物管理注意事项
  source_page: 96
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 稳定型心绞痛常用阿司匹林、硝酸甘油和他汀类药物。
  - 不稳定型心绞痛需联合抗血小板药（如氯吡格雷）和肝素。
  - 变异型心绞痛可用钙通道阻滞剂和硝酸酯类药物。
  pdf_page: 117
- id: CAD_COMPLICATIONS
  title: 并发症预防
  source_page: 94
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 控制高血压和糖尿病可减少心肌梗死风险。
  - 定期监测血脂和血糖，预防斑块破裂。
  - 避免情绪紧张和寒冷刺激，减少心绞痛发作。
  pdf_page: 115
- id: CAD_WHEN_TO_SEEK
  title: 何时就医
  source_page: 95
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 心绞痛发作频率增加或静息时出现，需立即就医。
  - 症状持续超过20分钟或含服硝酸甘油无效，警惕心肌梗死。
  - 伴有呼吸困难、出汗或恶心，提示严重缺血。
  pdf_page: 116
- id: CARD_CAD_EXERCISE
  title: 冠心病与体力活动
  source_page: 96
  evidence_level: 高
  recommendation: 建议
  key_points:
  - 体力活动是稳定型心绞痛的常见诱因，活动中出现胸痛或胸闷应立即停止活动并休息
  - 含服硝酸甘油可在数分钟内缓解活动诱发的心绞痛，随身携带并了解正确使用方法
  - 经治疗后症状稳定的冠心病患者在医生指导下可进行适量有氧运动
  pdf_page: 117
- id: CARD_CAD_REHAB
  title: 冠心病心脏康复
  source_page: 115
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 心肌梗死后应积极开展患者教育，使患者充分了解治疗价值及冠心病危险因素控制
  - 心脏康复计划包括运动训练、危险因素管理（戒烟、血压、血糖、血脂控制）和心理支持
  - 参与规范心脏康复计划可显著降低再次心肌梗死和心血管死亡风险
  pdf_page: 136
